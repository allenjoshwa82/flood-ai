<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction AI</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
        }

        .container {
            width: 420px;
            margin: 30px auto;
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        h2 { text-align: center; }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #555;
            margin-bottom: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover { transform: scale(1.05); }

        .result {
            margin-top: 15px;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-radius: 10px;
        }

        .high { background: red; color: white; }
        .medium { background: orange; color: white; }
        .low { background: green; color: white; }

        .chatbox {
            margin: 20px auto;
            width: 420px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        #map {
            height: 320px;
            width: 90%;
            margin: 20px auto;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌊 Flood Prediction AI</h2>
    <p class="subtitle">AI-powered disaster prediction system 🌍</p>

    <form action="/predict" method="post" onsubmit="loading()">

        <input name="river" placeholder="River Discharge" required>
        <input name="water" placeholder="Water Level" required>
        <input name="elevation" placeholder="Elevation" required>

        <select name="land">
            <option>Agricultural</option>
            <option>Forest</option>
            <option>Urban</option>
        </select>

        <select name="soil">
            <option>Clay</option>
            <option>Sandy</option>
            <option>Loamy</option>
        </select>

        <input name="pop" placeholder="Population Density" required>
        <input name="infra" placeholder="Infrastructure (0/1)" required>
        <input name="history" placeholder="Historical Floods" required>

        <button id="predictBtn" type="submit">🚀 Predict Risk</button>
    </form>

    {% if prediction_text %}
    <div id="resultBox" class="result 
        {% if 'HIGH' in prediction_text %}high
        {% elif 'MEDIUM' in prediction_text %}medium
        {% else %}low{% endif %}">
        {{ prediction_text }}
    </div>
    {% endif %}
</div>

<!-- 🤖 Chatbot -->
<div class="chatbox">
    <h3>🤖 AI Assistant</h3>
    <input id="msg" placeholder="Ask about floods...">
    <button onclick="sendMsg()">Send</button>
    <p id="reply"></p>
</div>

<!-- 🌍 Map -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🔄 Loading button
function loading(){
    document.getElementById("predictBtn").innerText = "Predicting...";
}

// 🤖 Chatbot
function sendMsg(){
    let msg = document.getElementById("msg").value;

    fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'message=' + msg
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("reply").innerText = data.reply;
        document.getElementById("msg").value = "";
    });
}

// 🌍 Map
var map = L.map('map').setView([13.08, 80.27], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 📍 Auto location
navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;

    map.setView([lat, lon], 12);

    L.marker([lat, lon]).addTo(map)
        .bindPopup("📍 Your Location")
        .openPopup();
});

// 🎯 Show risk marker dynamically
var resultBox = document.getElementById("resultBox");

if(resultBox){
    let text = resultBox.innerText;

    let color = "green";

    if(text.includes("HIGH")) color = "red";
    else if(text.includes("MEDIUM")) color = "orange";

    L.circleMarker(map.getCenter(), {
        color: color,
        radius: 12
    }).addTo(map)
      .bindPopup("Prediction Result")
      .openPopup();
}

</script>

</body>
</html>
